document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

amily: 'Roboto Slab';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"04c0e54f-6ad5-42f8-9b15-a3b5fd250fd0\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Roboto Slab';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"0a535567-2d70-4617-918a-d5428a4cde7c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ===========================================================\n   Pay Apps Workflow — Visual Reference\n   LV Construction x Six Peak Capital\n   =========================================================== */\n\n:root {\n  /* Brand palette — extracted from LV logo */\n  --lv-orange: #E55A1F;\n  --lv-orange-soft: #F3864E;\n  --lv-maroon: #8C2F1E;\n  --lv-maroon-deep: #5E1E11;\n\n  /* Document palette */\n  --paper: #F6F1E7;          /* warm cream */\n  --paper-deep: #EDE4D1;     /* shaded cream for cards */\n  --paper-line: #E1D6BE;     /* divider lines */\n  --ink: #1A1410;            /* near-black, warm */\n  --ink-soft: #534A41;\n  --ink-mute: #8A7E72;\n  --accent-flag: #C94F2C;    /* risk / time-sink */\n  --accent-ok: #2F6B3C;      /* approved / pass */\n  --accent-blue: #2C4A6B;    /* system badge */\n\n  --radius: 2px;\n  --border: 1.5px solid var(--ink);\n  --border-thin: 1px solid var(--paper-line);\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\nhtml, body {\n  background: var(--paper);\n  color: var(--ink);\n  font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;\n  font-size: 15px;\n  line-height: 1.55;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.doc {\n  max-width: 1280px;\n  margin: 0 auto;\n  padding: 56px 64px 120px;\n}\n\n/* ----------  Typography  ---------- */\n.serif, h1, h2, h3, .slab {\n  font-family: 'Roboto Slab', 'Rockwell', 'Courier New', serif;\n  font-weight: 700;\n  letter-spacing: -0.01em;\n}\n.mono, code, .code {\n  font-family: 'JetBrains Mono', 'IBM Plex Mono', 'Menlo', monospace;\n  font-weight: 500;\n  letter-spacing: -0.01em;\n}\nh1 { font-size: clamp(40px, 5vw, 64px); line-height: 0.98; letter-spacing: -0.02em; }\nh2 { font-size: 34px; line-height: 1.05; }\nh3 { font-size: 22px; line-height: 1.15; }\nh4 { font-size: 15px; line-height: 1.2; font-weight: 700; letter-spacing: 0.02em; }\n\n.eyebrow {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 11px;\n  font-weight: 600;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.eyebrow.orange { color: var(--lv-orange); }\n.eyebrow.maroon { color: var(--lv-maroon); }\n\n/* ----------  Masthead  ---------- */\n.masthead {\n  border-top: 4px solid var(--ink);\n  border-bottom: 1.5px solid var(--ink);\n  padding: 24px 0 22px;\n  display: grid;\n  grid-template-columns: 1fr auto 1fr;\n  align-items: center;\n  gap: 40px;\n}\n.masthead .left   { text-align: left;  }\n.masthead .mid    { text-align: center; }\n.masthead .right  { text-align: right; }\n.masthead img { height: 44px; }\n.mh-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--ink-mute); text-transform: uppercase; }\n\n/* ----------  Hero  ---------- */\n.hero { padding: 72px 0 56px; border-bottom: 1.5px solid var(--ink); }\n.hero .label { margin-bottom: 22px; display: flex; gap: 12px; align-items: center; }\n.hero .title-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; align-items: end; }\n.hero h1 { color: var(--ink); }\n.hero h1 em { font-style: normal; color: var(--lv-orange); }\n.hero .blurb { font-size: 16px; line-height: 1.55; color: var(--ink-soft); max-width: 46ch; padding-bottom: 8px; }\n.hero .stripe { height: 6px; background: var(--lv-orange); margin-top: 28px; }\n.hero .stripe-dark { height: 2px; background: var(--lv-maroon); margin-top: 4px; }\n\n.stats-row {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1.65fr 1fr;\n  gap: 0;\n  margin-top: 40px;\n  border-top: 1px solid var(--ink);\n  border-bottom: 1px solid var(--ink);\n}\n.stat { padding: 18px 22px; border-right: 1px solid var(--paper-line); }\n.stat + .stat { padding-left: 24px; }\n.stat:last-child { border-right: none; }\n.stat .n { font-family: 'Roboto Slab', serif; font-size: 34px; font-weight: 700; color: var(--ink); line-height: 1; }\n.stat .n span { color: var(--lv-orange); }\n.stat.money .n { letter-spacing: -0.015em; white-space: nowrap; }\n.stat.money .scale b { white-space: nowrap; }\n.stat .k { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-mute); margin-top: 10px; }\n.stat .scale { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-soft); margin-top: 8px; letter-spacing: 0.02em; }\n.stat .scale b { color: var(--ink); font-weight: 600; }\n.stat .scale .lbl { color: var(--ink-mute); font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; margin-right: 6px; }\n\n/* ----------  Section headers  ---------- */\n.section { padding: 72px 0 20px; }\n.section-header { display: flex; align-items: baseline; gap: 18px; border-bottom: 2px solid var(--ink); padding-bottom: 18px; margin-bottom: 36px; }\n.section-header .num {\n  font-family: 'Roboto Slab', serif;\n  font-size: 22px;\n  font-weight: 700;\n  color: var(--lv-orange);\n  min-width: 78px;\n}\n.section-header h2 { flex: 1; }\n.section-header .kicker { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-mute); letter-spacing: 0.15em; text-transform: uppercase; }\n\n/* ----------  Overview grid  ---------- */\n.overview-grid {\n  display: grid;\n  grid-template-columns: repeat(12, 1fr);\n  gap: 0;\n  border: 1.5px solid var(--ink);\n  background: var(--paper);\n}\n.ov-cell { padding: 20px 22px; border-right: 1px solid var(--paper-line); border-bottom: 1px solid var(--paper-line); }\n.ov-cell.span-4 { grid-column: span 4; }\n.ov-cell.span-6 { grid-column: span 6; }\n.ov-cell.span-8 { grid-column: span 8; }\n.ov-cell.span-12 { grid-column: span 12; border-right: none; }\n.ov-cell h4 { color: var(--lv-maroon); font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }\n.ov-cell p { font-size: 14.5px; color: var(--ink); }\n.ov-cell .big { font-family: 'Roboto Slab', serif; font-size: 22px; font-weight: 700; color: var(--ink); }\n.ov-cell .sys-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }\n.ov-cell .chip { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; padding: 3px 8px; background: var(--paper-deep); border: 1px solid var(--ink); color: var(--ink); }\n\n.ov-cell.assumptions { background: var(--paper-deep); border-top: 1.5px solid var(--ink); }\n.ov-cell.assumptions .assumptions-sub { font-size: 13.5px; color: var(--ink-soft); margin-bottom: 18px; }\n.assumptions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }\n.assumption-col { border-left: 2px solid var(--lv-orange); padding-left: 14px; }\n.assumption-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 10px; font-weight: 600; }\n.assumption-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }\n.assumption-list li { font-size: 14px; color: var(--ink); padding: 10px 12px; background: var(--paper); border: 1px dashed var(--paper-line); }\n.assumption-list li.placeholder { color: var(--ink-mute); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-style: normal; }\n\n/* ----------  Money flow  ---------- */\n.money-flow {\n  background: var(--paper-deep);\n  border: 1.5px solid var(--ink);\n  padding: 32px 36px;\n  margin: 30px 0;\n  position: relative;\n}\n.money-flow .corner {\n  position: absolute; top: -1.5px; left: -1.5px;\n  background: var(--lv-maroon); color: #fff;\n  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em;\n  padding: 6px 12px; text-transform: uppercase;\n}\n.money-flow h3 { margin: 10px 0 18px; }\n.money-flow p { max-width: 78ch; color: var(--ink-soft); font-size: 14.5px; margin-bottom: 20px; }\n\n.flow-chain {\n  display: grid;\n  grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr;\n  align-items: center;\n  gap: 0;\n  margin-top: 12px;\n}\n.flow-node {\n  border: 1.5px solid var(--ink);\n  background: var(--paper);\n  padding: 14px 16px;\n  text-align: center;\n}\n.flow-node .role { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; color: var(--ink-mute); text-transform: uppercase; }\n.flow-node .name { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 17px; margin-top: 4px; }\n.flow-arrow {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 20px;\n  color: var(--lv-orange);\n  padding: 0 10px;\n}\n\n.risk-note {\n  border-left: 4px solid var(--accent-flag);\n  padding: 12px 16px;\n  margin-top: 20px;\n  background: var(--paper);\n  font-size: 13.5px;\n  color: var(--ink-soft);\n}\n.risk-note strong { color: var(--accent-flag); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; }\n\n/* ----------  Phase band  ---------- */\n.phase {\n  margin: 64px 0 0;\n}\n.phase-band {\n  display: grid;\n  grid-template-columns: 120px 1fr auto;\n  align-items: stretch;\n  border-top: 2px solid var(--ink);\n  border-bottom: 1.5px solid var(--ink);\n  background: var(--paper-deep);\n}\n.phase-band .ph-num {\n  background: var(--lv-orange);\n  color: #fff;\n  font-family: 'Roboto Slab', serif;\n  font-weight: 700;\n  font-size: 44px;\n  display: flex; align-items: center; justify-content: center;\n  line-height: 1;\n}\n.phase-band .ph-title { padding: 20px 24px; }\n.phase-band .ph-title .eyebrow { color: var(--lv-maroon); }\n.phase-band .ph-title h2 { margin-top: 4px; font-size: 28px; }\n.phase-band .ph-meta { padding: 20px 24px; text-align: right; border-left: 1px solid var(--paper-line); display: flex; flex-direction: column; justify-content: center; min-width: 200px; }\n.phase-band .ph-meta .k { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; color: var(--ink-mute); text-transform: uppercase; }\n.phase-band .ph-meta .v { font-family: 'Roboto Slab', serif; font-size: 18px; font-weight: 700; margin-top: 2px; }\n\n/* ----------  Step card  ---------- */\n.steps { display: grid; grid-template-columns: 1fr; gap: 0; border-left: 1.5px solid var(--ink); border-right: 1.5px solid var(--ink); }\n.step {\n  display: grid;\n  grid-template-columns: 96px 1fr 340px;\n  gap: 0;\n  border-bottom: 1px solid var(--paper-line);\n  background: var(--paper);\n}\n.step:last-child { border-bottom: 1.5px solid var(--ink); }\n.step.timesink { background: #FCEEE3; }\n.step.legal { background: #FDF4E8; }\n\n.step .idx {\n  font-family: 'Roboto Slab', serif;\n  font-weight: 700;\n  font-size: 26px;\n  padding: 22px 18px;\n  border-right: 1px solid var(--paper-line);\n  color: var(--ink);\n  line-height: 1;\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n.step .idx .tag { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.14em; font-weight: 600; color: var(--accent-flag); text-transform: uppercase; }\n.step .idx .tag.legal { color: var(--lv-maroon); }\n\n.step .body { padding: 22px 24px; border-right: 1px solid var(--paper-line); }\n.step .body h3 { font-size: 17px; line-height: 1.2; margin-bottom: 8px; }\n.step .body p { font-size: 14px; color: var(--ink-soft); }\n.step .body p + p { margin-top: 8px; }\n.step .body .rule {\n  margin-top: 12px;\n  padding: 10px 12px;\n  border-left: 3px solid var(--lv-maroon);\n  background: var(--paper-deep);\n  font-size: 13px;\n  color: var(--ink-soft);\n}\n.step .body .rule strong { color: var(--lv-maroon); font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; }\n\n.step .meta { padding: 22px 24px; display: flex; flex-direction: column; gap: 14px; background: rgba(0,0,0,0.015); }\n\n.meta-row { display: flex; flex-direction: column; gap: 4px; }\n.meta-row .k { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; letter-spacing: 0.14em; color: var(--ink-mute); text-transform: uppercase; font-weight: 600; }\n.meta-row .v { font-size: 13.5px; font-weight: 500; color: var(--ink); }\n.owner-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }\n.owner-chip {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 11px;\n  padding: 2px 7px;\n  border: 1px solid var(--ink);\n  background: var(--paper);\n  color: var(--ink);\n  letter-spacing: 0.02em;\n}\n.owner-chip.ceo { background: var(--ink); color: var(--paper); }\n\n/* System chips */\n.sys-list { display: flex; flex-wrap: wrap; gap: 4px; }\n.sys-chip {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10.5px;\n  padding: 2px 7px;\n  background: var(--paper-deep);\n  border: 1px solid var(--paper-line);\n  color: var(--ink-soft);\n}\n\n/* Time bar */\n.tbar { display: flex; flex-direction: column; gap: 4px; }\n.tbar .lbl { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-mute); letter-spacing: 0.1em; text-transform: uppercase; }\n.tbar .bar-wrap {\n  height: 10px;\n  background: var(--paper-line);\n  position: relative;\n  border: 1px solid var(--ink);\n}\n.tbar .bar {\n  height: 100%;\n  background: var(--ink);\n}\n.tbar .bar.sink { background: var(--lv-orange); }\n.tbar .bar.tiny { background: var(--ink-mute); }\n.tbar .scale {\n  display: flex; justify-content: space-between;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9.5px;\n  color: var(--ink-mute);\n  margin-top: 2px;\n  letter-spacing: 0.06em;\n}\n\n/* ----------  Doc generation subtable (Phase 2)  ---------- */\n.doc-table {\n  width: 100%;\n  border-collapse: collapse;\n  margin-top: 12px;\n  font-size: 13.5px;\n}\n.doc-table th, .doc-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--paper-line); vertical-align: top; }\n.doc-table th { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute); border-bottom: 1.5px solid var(--ink); }\n.doc-table td:first-child { font-family: 'Roboto Slab', serif; font-weight: 700; color: var(--ink); width: 44px; }\n.doc-table td.doc { font-weight: 600; }\n.doc-table tr:last-child td { border-bottom: none; }\n\n/* ----------  Audit comparisons (Phase 3)  ---------- */\n.audit-grid {\n  display: grid;\n  grid-template-columns: 52px 1.3fr 1.7fr 180px;\n  background: var(--paper);\n  border: 1.5px solid var(--ink);\n  margin-top: 20px;\n}\n.audit-grid > div { padding: 14px 16px; border-bottom: 1px solid var(--paper-line); border-right: 1px solid var(--paper-line); font-size: 13.5px; }\n.audit-grid > .code { font-size: 11.5px; letter-spacing: -0.01em; line-height: 1.45; color: var(--ink); font-weight: 500; }\n.audit-grid > div:nth-child(4n) { border-right: none; }\n.audit-grid .head { background: var(--ink); color: var(--paper); font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; border-bottom: none; }\n.audit-grid .head:nth-child(4n) { border-right: none; }\n.audit-grid .num { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 20px; color: var(--lv-orange); }\n.audit-grid .critical { color: var(--accent-flag); font-weight: 600; }\n\n/* Loop diagram */\n.loop-diagram {\n  margin-top: 28px;\n  padding: 28px 32px;\n  background: var(--paper-deep);\n  border: 1.5px solid var(--ink);\n  position: relative;\n}\n.loop-diagram .corner { position: absolute; top: -1.5px; left: -1.5px; background: var(--ink); color: var(--paper); font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; padding: 6px 12px; text-transform: uppercase; }\n.loop-diagram h3 { margin: 10px 0 16px; }\n.loop-chain { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; align-items: stretch; }\n.loop-node { border: 1.5px solid var(--ink); background: var(--paper); padding: 12px 14px; position: relative; }\n.loop-node .n { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-mute); letter-spacing: 0.12em; text-transform: uppercase; }\n.loop-node .t { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 15px; margin-top: 3px; }\n.loop-node .s { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }\n.loop-arc {\n  margin-top: 18px;\n  height: 40px;\n  position: relative;\n  border-top: 1.5px dashed var(--lv-orange);\n  border-left: 1.5px dashed var(--lv-orange);\n  border-right: 1.5px dashed var(--lv-orange);\n  border-radius: 8px 8px 0 0;\n  margin-left: 12.5%;\n  margin-right: 12.5%;\n}\n.loop-arc::after {\n  content: 'IF ANY FAIL → REVISE → RE-REVIEW';\n  position: absolute;\n  top: -11px;\n  left: 50%;\n  transform: translateX(-50%);\n  background: var(--paper-deep);\n  padding: 0 10px;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10.5px;\n  letter-spacing: 0.14em;\n  color: var(--accent-flag);\n}\n\n/* ----------  Phase 4 table  ---------- */\n.support-table {\n  width: 100%;\n  border-collapse: collapse;\n  margin-top: 10px;\n  border: 1.5px solid var(--ink);\n}\n.support-table th, .support-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--paper-line); font-size: 13.5px; vertical-align: top; }\n.support-table th { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-mute); background: var(--paper-deep); border-bottom: 1.5px solid var(--ink); }\n.support-table td:first-child { font-family: 'Roboto Slab', serif; font-weight: 700; width: 52px; color: var(--lv-orange); }\n.support-table .doc-name { font-weight: 600; }\n.support-table .doc-path { margin-top: 6px; font-weight: 400; }\n.support-table .doc-note { margin-top: 6px; font-size: 12px; color: var(--ink-mute); font-style: italic; font-weight: 400; line-height: 1.45; }\n.support-table tr:last-child td { border-bottom: none; }\n\n/* ----------  Dominant time sinks viz  ---------- */\n.sinks-wrap { margin: 32px 0 0; }\n.sink-row {\n  display: grid;\n  grid-template-columns: 280px 1fr 160px 120px;\n  align-items: center;\n  gap: 16px;\n  padding: 14px 0;\n  border-bottom: 1px solid var(--paper-line);\n}\n.sink-row:first-of-type { border-top: 1.5px solid var(--ink); }\n.sink-row:last-of-type { border-bottom: 1.5px solid var(--ink); }\n.sink-row .name { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 15px; }\n.sink-row .name .sub { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-mute); font-weight: 400; display: block; letter-spacing: 0.1em; margin-top: 2px; text-transform: uppercase; }\n.sink-row .bar-area { height: 30px; background: var(--paper-deep); border: 1px solid var(--ink); position: relative; }\n.sink-row .bar-area .b5 { position: absolute; left: 0; top: 0; bottom: 0; background: var(--lv-orange); }\n.sink-row .bar-area .b9 { position: absolute; left: 0; top: 0; bottom: 0; background: var(--lv-orange); opacity: 0.35; border-right: 2px dashed var(--lv-maroon); }\n.sink-row .bar-area .scale-line {\n  position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(0,0,0,0.12);\n}\n.sink-row .hours { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 16px; color: var(--ink); }\n.sink-row .hours span { color: var(--ink-mute); font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 11px; display: block; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }\n.sink-row .who { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink); letter-spacing: 0.04em; }\n\n.sink-scale { display: grid; grid-template-columns: 280px 1fr 160px 120px; gap: 16px; font-family: 'JetBrains Mono', monospace; font-size: 9.5px; color: var(--ink-mute); padding-top: 6px; letter-spacing: 0.08em; }\n.sink-scale .axis { display: flex; justify-content: space-between; }\n\n/* ----------  Cost summary  ---------- */\n.cost-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; border: 1.5px solid var(--ink); margin-top: 20px; }\n.cost-cell { padding: 22px 24px; border-right: 1px solid var(--paper-line); border-bottom: 1px solid var(--paper-line); }\n.cost-cell:nth-child(2n) { border-right: none; }\n.cost-cell h4 { color: var(--lv-maroon); font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 12px; }\n.cost-cell .big { font-family: 'Roboto Slab', serif; font-size: 34px; font-weight: 700; color: var(--ink); line-height: 1; }\n.cost-cell .big span { color: var(--lv-orange); }\n.cost-cell .sub { font-size: 13px; color: var(--ink-soft); margin-top: 8px; }\n\n/* ----------  Future state  ---------- */\n.future-band {\n  margin-top: 96px;\n  padding: 64px 56px;\n  background: var(--ink);\n  color: var(--paper);\n  border: 1.5px solid var(--ink);\n  position: relative;\n}\n.future-band .stripe-top { position: absolute; top: 0; left: 0; right: 0; height: 6px; background: var(--lv-orange); }\n.future-band .eyebrow { color: var(--lv-orange-soft); }\n.future-band h2 { color: var(--paper); font-size: 38px; margin: 10px 0 16px; white-space: nowrap; }\n.future-band .lead { max-width: 78ch; font-size: 16px; line-height: 1.6; color: #D8CCB3; }\n\n.future-before-after {\n  display: grid;\n  grid-template-columns: 1fr auto 1fr;\n  gap: 0;\n  margin-top: 36px;\n  align-items: stretch;\n}\n.ba-col { padding: 22px 24px; border: 1px solid rgba(255,255,255,0.2); }\n.ba-col .k { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; color: var(--lv-orange-soft); text-transform: uppercase; margin-bottom: 10px; }\n.ba-col .v { font-family: 'Roboto Slab', serif; font-size: 22px; font-weight: 700; color: var(--paper); }\n.ba-col .v span { color: var(--lv-orange-soft); font-size: 14px; display: block; font-weight: 500; margin-top: 4px; }\n.ba-arrow { display: flex; align-items: center; justify-content: center; padding: 0 18px; font-family: 'Roboto Slab', serif; font-size: 26px; color: var(--lv-orange); }\n\n.f-phase {\n  margin-top: 44px;\n  border-top: 1.5px solid rgba(255,255,255,0.25);\n  padding-top: 22px;\n}\n.f-phase .f-title { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; color: var(--lv-orange-soft); text-transform: uppercase; margin-bottom: 14px; }\n.f-phase h3 { color: var(--paper); font-size: 22px; margin-bottom: 20px; }\n.f-steps { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }\n.f-step {\n  border: 1px solid rgba(255,255,255,0.25);\n  padding: 16px 18px;\n  background: rgba(255,255,255,0.03);\n}\n.f-step .idx { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 16px; color: var(--lv-orange-soft); }\n.f-step h4 { color: var(--paper); font-size: 15px; margin: 4px 0 6px; font-weight: 700; letter-spacing: 0; }\n.f-step p { font-size: 13px; line-height: 1.5; color: #B8AE97; }\n.f-step .replaces {\n  margin-top: 10px;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10.5px;\n  color: #8A7D63;\n  letter-spacing: 0.06em;\n}\n.f-step .replaces span { color: var(--lv-orange-soft); }\n\n/* Foundation block — One Source of Truth */\n.foundation {\n  margin-top: 44px;\n  padding: 32px 0 28px;\n  border-top: 1px solid rgba(255,255,255,0.25);\n  border-bottom: 1px solid rgba(255,255,255,0.25);\n}\n.foundation .eyebrow {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10.5px;\n  color: var(--lv-orange-soft);\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  margin-bottom: 14px;\n}\n.foundation .f-head {\n  display: flex;\n  align-items: baseline;\n  flex-wrap: wrap;\n  gap: 18px;\n  margin-bottom: 20px;\n}\n.foundation .f-headline {\n  font-family: 'Roboto Slab', serif;\n  font-weight: 700;\n  font-size: 46px;\n  line-height: 1.02;\n  color: var(--paper);\n  letter-spacing: -0.01em;\n  margin: 0;\n}\n.foundation .f-kicker {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 13px;\n  color: var(--lv-orange);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n}\n.foundation .f-lead {\n  font-size: 14.5px;\n  line-height: 1.65;\n  color: #C9BFA8;\n  max-width: 68ch;\n  margin: 0 0 28px;\n}\n.foundation .f-lead strong { color: var(--paper); font-weight: 600; }\n.foundation .f-cols {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 0;\n  border-top: 1px solid rgba(255,255,255,0.12);\n}\n.foundation .f-col {\n  padding: 22px 24px 4px 0;\n  border-right: 1px solid rgba(255,255,255,0.12);\n}\n.foundation .f-col:not(:first-child) { padding-left: 24px; }\n.foundation .f-col:last-child { border-right: none; padding-right: 0; }\n.foundation .f-col .label {\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10.5px;\n  color: var(--lv-orange-soft);\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  margin-bottom: 8px;\n}\n.foundation .f-col .title {\n  font-family: 'Roboto Slab', serif;\n  font-weight: 700;\n  font-size: 17px;\n  color: var(--paper);\n  margin: 0 0 10px;\n}\n.foundation .f-col .body {\n  font-size: 13px;\n  color: #B8AE97;\n  line-height: 1.6;\n}\n\n/* Future metrics */\n.f-metrics {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 0;\n  margin-top: 40px;\n  border-top: 1px solid rgba(255,255,255,0.25);\n  border-bottom: 1px solid rgba(255,255,255,0.25);\n}\n.f-metric { padding: 22px 22px; border-right: 1px solid rgba(255,255,255,0.18); }\n.f-metric:last-child { border-right: none; }\n.f-metric .k { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em; color: var(--lv-orange-soft); text-transform: uppercase; }\n.f-metric .now { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: #8A7D63; text-decoration: line-through; margin: 10px 0 4px; }\n.f-metric .fut { font-family: 'Roboto Slab', serif; font-weight: 700; font-size: 22px; color: var(--paper); }\n.f-metric .fut span { color: var(--lv-orange-soft); }\n\n/* ----------  Colophon  ---------- */\n.colophon {\n  margin-top: 72px;\n  padding-top: 28px;\n  border-top: 4px solid var(--ink);\n  display: flex;\n  justify-content: space-between;\n  align-items: center;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 10.5px;\n  letter-spacing: 0.14em;\n  color: var(--ink-mute);\n  text-transform: uppercase;\n}\n.colophon .dot { margin: 0 8px; color: var(--lv-orange); }\n\n/* ----------  Utility  ---------- */\n.divider { height: 1.5px; background: var(--ink); margin: 40px 0 30px; }\n.divider-thin { height: 1px; background: var(--paper-line); margin: 24px 0; }\n.flag-pill {\n  display: inline-block;\n  font-family: 'JetBrains Mono', monospace;\n  font-size: 9.5px;\n  font-weight: 600;\n  padding: 2px 7px;\n  border-radius: 2px;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n}\n.flag-pill.sink { background: var(--lv-orange); color: #fff; }\n.flag-pill.legal { background: var(--lv-maroon); color: #fff; }\n.flag-pill.ceo { background: var(--ink); color: var(--paper); }\n\n/* Print */\n@media print {\n  body { background: #fff; }\n  .doc { max-width: none; padding: 24px 32px; }\n  .future-band { page-break-before: always; }\n  .phase { page-break-inside: avoid; }\n  .step { page-break-inside: avoid; }\n}\n\n@media (max-width: 1080px) {\n  .doc { padding: 40px 28px 80px; }\n  .hero .title-row { grid-template-columns: 1fr; }\n  .step { grid-template-columns: 72px 1fr; }\n  .step .meta { grid-column: 1 / -1; border-top: 1px solid var(--paper-line); border-right: none; }\n  .f-steps, .f-metrics, .stats-row, .future-before-after, .foundation .f-cols { grid-template-columns: 1fr; }\n  .foundation .f-col { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.12); padding: 20px 0; }\n  .foundation .f-col:not(:first-child) { padding-left: 0; }\n  .foundation .f-col:last-child { border-bottom: none; }\n  .flow-chain { grid-template-columns: 1fr; gap: 10px; }\n  .flow-arrow { transform: rotate(90deg); padding: 6px 0; }\n  .sink-row, .sink-scale { grid-template-columns: 1fr; gap: 6px; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body data-cc-id=\"cc-1\" style=\"cursor: crosshair;\">\n\n\n<div class=\"doc\" data-cc-id=\"cc-3\">\n\n<!-- ============ MASTHEAD ============ -->\n<header class=\"masthead\">\n  <div class=\"left\">\n    <img src=\"746ecfb8-9823-4eff-9058-13b77edb90a0\" alt=\"LV Affordable Construction LP\">\n  <\u002Fdiv>\n  <div class=\"mid\">\n    <div class=\"mh-meta\">Confidential · Internal Reference<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"right\">\n    <div class=\"mh-meta\">Six Peak Capital <span style=\"color: var(--lv-orange)\">●<\u002Fspan> LV Construction<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============ HERO ============ -->\n<section class=\"hero\" data-cc-id=\"cc-2\">\n  <div class=\"label\">\n    <span class=\"eyebrow orange\">Workflow WF-04-001<\u002Fspan>\n    <span class=\"eyebrow\">/<\u002Fspan>\n    <span class=\"eyebrow\">Module 4 · Document Intelligence<\u002Fspan>\n    <span class=\"eyebrow\">/<\u002Fspan>\n    <span class=\"eyebrow\">Module 5 · Financial Command Center<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"title-row\">\n    <h1>Pay Applications<br><em>Current Workflow<\u002Fem><\u002Fh1>\n    <div class=\"blurb\">\n      A step-by-step visual of how LV Construction currently compiles, audits, and submits monthly pay application packages to owners — from subcontractor pay application collection through bank draw release. Every step, every owner, every time sink.\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"stripe\"><\u002Fdiv>\n  <div class=\"stripe-dark\"><\u002Fdiv>\n\n  <div class=\"stats-row\">\n    <div class=\"stat\"><div class=\"n\" data-cc-id=\"cc-3\" style=\"\">15–30<\u002Fdiv><div class=\"k\" data-cc-id=\"cc-1\" style=\"\">SubContractor Pay Apps / Project / Month<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"n\"><span>~62<\u002Fspan> hrs<\u002Fdiv><div class=\"k\">Team Time / Month @ 5 Proj.<\u002Fdiv><div class=\"scale\"><span class=\"lbl\">@ 9 proj<\u002Fspan><b>~112 hrs<\u002Fb><\u002Fdiv><\u002Fdiv>\n    <div class=\"stat money\"><div class=\"n\">~$89.3K–$98.5K<\u002Fdiv><div class=\"k\">Full Workflow Annual Labor @ 5 Proj<\u002Fdiv><div class=\"scale\"><span class=\"lbl\">@ 9 proj<\u002Fspan><b>~$160.7K–$177.2K / yr<\u002Fb><\u002Fdiv><\u002Fdiv>\n    <div class=\"stat\"><div class=\"n\">8.3<span> / 10<\u002Fspan><\u002Fdiv><div class=\"k\">AI Automation Score<\u002Fdiv><div class=\"scale\" data-cc-id=\"cc-3\"><span class=\"lbl\" data-cc-id=\"cc-4\" style=\"\"><\u002Fspan><b data-cc-id=\"cc-2\" style=\"\"><\u002Fb><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SECTION 1 · OVERVIEW ============ -->\n<section class=\"section\" data-cc-id=\"cc-6\">\n  <div class=\"section-header\">\n    <div class=\"num\">§ 01<\u002Fdiv>\n    <h2>Workflow Overview<\u002Fh2>\n    <div class=\"kicker\">Purpose · Trigger · Systems<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"overview-grid\">\n    <div class=\"ov-cell span-8\" data-cc-id=\"cc-5\">\n      <h4>Purpose<\u002Fh4>\n      <p data-cc-id=\"cc-4\" style=\"\">Compile and audit all subcontractor invoices, updated SOVs and conditional/unconditional lien releases in order to generate the payment application to owners for successful bank draw release.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"ov-cell span-4\">\n      <h4>Frequency<\u002Fh4>\n      <p class=\"big\">Monthly<\u002Fp>\n      <p style=\"color: var(--ink-soft); font-size: 13px; margin-top: 4px;\">Per active project · continuous cycle<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"ov-cell span-6\">\n      <h4>Trigger<\u002Fh4>\n      <p data-cc-id=\"cc-7\" style=\"\">Monthly billing cycle. All subcontractor invoices must arrive by the <strong>25th<\u002Fstrong> of each month. LV admin operations prepare monthly payment applications during the first <b>5 <\u002Fb>business days of each month. The completed payment application is sent to the owner by the <b>8th<\u002Fb>&nbsp;of each month.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"ov-cell span-6\">\n      <h4>End State<\u002Fh4>\n      <p data-cc-id=\"cc-8\" style=\"\">Owner formally approves the payment application package. Funds get released from the bank approximately 2 to 3 weeks after payment application approval. All documents filed in Box.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"ov-cell span-6\">\n      <h4>Primary Systems<\u002Fh4>\n      <div class=\"sys-chips\">\n        <span class=\"chip\">Outlook<\u002Fspan>\n        <span class=\"chip\">Box<\u002Fspan>\n        <span class=\"chip\">Bluebeam<\u002Fspan>\n        <span class=\"chip\">Yardi (P2P)<\u002Fspan>\n        <span class=\"chip\">Excel<\u002Fspan>\n        <span class=\"chip\">Autodesk Build<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ov-cell span-6\">\n      <h4>Stakeholders<\u002Fh4>\n      <div class=\"sys-chips\">\n        <span class=\"chip\" data-cc-id=\"cc-9\" style=\"\">Grady · President<\u002Fspan>\n        <span class=\"chip\">Alina · Coord.<\u002Fspan>\n        <span class=\"chip\">Brisa · Coord.<\u002Fspan>\n        <span class=\"chip\" data-cc-id=\"cc-11\" style=\"\">Kim · Office Mgr.<\u002Fspan>\n        <span class=\"chip\">Robert · Controller<\u002Fspan>\n        <span class=\"chip\">Pedro · PM<\u002Fspan>\n        <span class=\"chip\">Greg · PM<\u002Fspan>\n        <span class=\"chip\">Site Supers<\u002Fspan>\n        <span class=\"chip\" data-cc-id=\"cc-10\" style=\"\">Owner / Lender<\u002Fspan>\n        <span class=\"chip\">Subs / Vendors<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ov-cell span-12 assumptions\">\n      <h4>Critical Assumptions<\u002Fh4>\n      <p class=\"assumptions-sub\">Explicit preconditions and post-conditions of the workflow.<\u002Fp>\n      <div class=\"assumptions-grid\">\n        <div class=\"assumption-col\">\n          <div class=\"assumption-eyebrow\">Inputs · Before workflow begins<\u002Fdiv>\n          <ul class=\"assumption-list\">\n            <li>Subcontractor contracts fully executed for all billing subs<\u002Fli>\n            <li>Sub-tier vendor preliminary notices received &amp; filed<\u002Fli>\n            <li>Yardi project setup current (cost codes, vendors, contract values)<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"assumption-col\">\n          <div class=\"assumption-eyebrow\">Post-State · After workflow completes<\u002Fdiv>\n          <ul class=\"assumption-list\">\n            <li>Owner draw received; subs paid per approved pay app<\u002Fli>\n            <li>Unconditional lien releases collected from paid subs<\u002Fli>\n            <li>Yardi updated with approved billing &amp; payments<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Money flow -->\n  <div class=\"money-flow\">\n    <div class=\"corner\">Fiscal Responsibility Principle<\u002Fdiv>\n    <h3>Always know where the money flows.<\u002Fh3>\n    <p>The #1 financial responsibility of LV as GC is tracking the flow of money from owner through sub-tier vendors. Two failure modes create direct exposure: <strong>(1)<\u002Fstrong> a sub goes out of business — SOV tracking, retention, and lien compliance are the safeguards; <strong>(2)<\u002Fstrong> a sub fails to pay their sub-tier vendors — those vendors retain mechanic's lien rights against the property regardless of whether LV paid the sub.<\u002Fp>\n\n    <div class=\"flow-chain\">\n      <div class=\"flow-node\"><div class=\"role\">Source of Funds<\u002Fdiv><div class=\"name\">Owner<\u002Fdiv><\u002Fdiv>\n      <div class=\"flow-arrow\">━▶<\u002Fdiv>\n      <div class=\"flow-node\"><div class=\"role\">GC<\u002Fdiv><div class=\"name\">LV Construction<\u002Fdiv><\u002Fdiv>\n      <div class=\"flow-arrow\">━▶<\u002Fdiv>\n      <div class=\"flow-node\"><div class=\"role\">Tier 1<\u002Fdiv><div class=\"name\">Subcontractor<\u002Fdiv><\u002Fdiv>\n      <div class=\"flow-arrow\">━▶<\u002Fdiv>\n      <div class=\"flow-node\"><div class=\"role\" data-cc-id=\"cc-1\" style=\"\">Tier 2<\u002Fdiv><div class=\"name\">Sub-tier Vendor<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"risk-note\">\n      <strong>[Risk]<\u002Fstrong> &nbsp; A single unpaid material supplier can file a mechanic's lien against the property regardless of whether LV paid the sub. <strong>Do not overbill SOVs.<\u002Fstrong>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SECTION 2 · CURRENT STATE ============ -->\n<section class=\"section\" data-cc-id=\"cc-10\">\n  <div class=\"section-header\">\n    <div class=\"num\">§ 02<\u002Fdiv>\n    <h2>Current State Process Flow<\u002Fh2>\n    <div class=\"kicker\">5 Phases · 25+ Steps<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- legend -->\n  <div style=\"display:flex; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; font-size: 12.5px; color: var(--ink-soft); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.06em;\">\n    <span><span class=\"flag-pill sink\">TIME SINK<\u002Fspan> &nbsp;4 dominant bottlenecks<\u002Fspan>\n    <span><span class=\"flag-pill legal\">LEGAL<\u002Fspan> &nbsp;Compliance / risk exposure<\u002Fspan>\n    <span><span class=\"flag-pill ceo\">PRES. TIME<\u002Fspan> &nbsp;Clerical work hitting Grady (Pres.)<\u002Fspan>\n    <span style=\"display:inline-flex;align-items:center;gap:6px;\"><span style=\"width:22px;height:8px;background:var(--lv-orange);display:inline-block;border:1px solid var(--ink)\"><\u002Fspan> Time bar (per project, per month)<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- PHASE 1 -->\n  <div class=\"phase\">\n    <div class=\"phase-band\">\n      <div class=\"ph-num\">1<\u002Fdiv>\n      <div class=\"ph-title\">\n        <div class=\"eyebrow\">Phase One<\u002Fdiv>\n        <h2 data-cc-id=\"cc-7\" style=\"\">Monthly Subcontractor Pay App Collection &amp; Invoice Tagging<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"ph-meta\" data-cc-id=\"cc-13\">\n        <div class=\"k\" data-cc-id=\"cc-12\" style=\"\">Phase Total (per Project)<\u002Fdiv>\n        <div class=\"v\" data-cc-id=\"cc-11\" style=\"\">~10 hrs<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"steps\">\n\n      <!-- 1.1 -->\n      <div class=\"step\">\n        <div class=\"idx\">1.1<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Sub/Vendor Reminder Email<\u002Fh3>\n          <p data-cc-id=\"cc-1\" style=\"\">Bulk reminder email sent to all active subs 2 days before the 25th. References monthly tracker and contract log to determine recipients. Continues reminding subs even after scope is complete until they ask to be removed. Certain subs emailed separately to identify the correct AP/AR contact.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\" data-cc-id=\"cc-5\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Alina<\u002Fspan><span class=\"owner-chip\">Brisa<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-4\" style=\"\">~5 min / project / month<\u002Fspan>\n            <div class=\"bar-wrap\"><div class=\"bar tiny\" style=\"width: 2.1%; background-color: rgb(26, 20, 16);\" data-cc-id=\"cc-7\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Outlook<\u002Fspan><span class=\"sys-chip\">Excel Tracker<\u002Fspan><span class=\"sys-chip\">Box<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.2 -->\n      <div class=\"step\">\n        <div class=\"idx\">1.2<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-6\">\n          <h3 data-cc-id=\"cc-8\" style=\"\">Subcontractor Pay Application Receipt<\u002Fh3>\n          <p data-cc-id=\"cc-5\" style=\"\">Subs email pay application to team members. Each pay application must include: an itemized invoice, an updated SOV, and a conditional lien release waiver with correct dollar amount, date, and signature. Approximately 15 to 30 individual pay applications will be received each month.<\u002Fp>\n          <div class=\"rule\" data-cc-id=\"cc-2\" style=\"\"><strong>Pain Point &nbsp;·&nbsp;<\u002Fstrong> No dedicated shared inbox — pay applications land in individual personal inboxes.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Subs / Vendors<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-1\" style=\"\">Incoming — not measured<\u002Fspan>\n            <div class=\"bar-wrap\"><div class=\"bar tiny\" style=\"width: 0%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Outlook<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.3 -->\n      <div class=\"step\">\n        <div class=\"idx\">1.3<\u002Fdiv>\n        <div class=\"body\">\n          <h3 data-cc-id=\"cc-1\" style=\"\">Subcontractor Pay Application Save to Box<\u002Fh3>\n          <p>Whoever receives the email manually saves each pay application (invoice + SOV + conditional lien release) to Box, navigating to <code class=\"code\">[Project]/Billings/[Specific Month]/Unapproved<\u002Fcode>. Naming convention: <code class=\"code\">[Vendor] - [Date]<\u002Fcode>.<\u002Fp>\n          <div class=\"rule\" data-cc-id=\"cc-4\" style=\"\"><strong>Pain Point &nbsp;·&nbsp;<\u002Fstrong> This step interrupts whatever else the person was working on.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Grady<\u002Fspan><span class=\"owner-chip\">Alina<\u002Fspan><span class=\"owner-chip\">Brisa<\u002Fspan><span class=\"owner-chip\">Kim<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-2\" style=\"\">~5 min / project / month<\u002Fspan>\n            <div class=\"bar-wrap\"><div class=\"bar\" style=\"width: 2%\" data-cc-id=\"cc-6\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Outlook<\u002Fspan><span class=\"sys-chip\">Box<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.4 -->\n      <div class=\"step timesink\">\n        <div class=\"idx\">1.4\n        <\u002Fdiv>\n        <div class=\"body\">\n          <h3>Lien Release Compliance Tracking <span class=\"flag-pill sink\" style=\"margin-left:6px;\">TIME SINK<\u002Fspan> <span class=\"flag-pill legal\" style=\"margin-left:4px;\">LEGAL<\u002Fspan><\u002Fh3>\n          <p data-cc-id=\"cc-3\" style=\"\">Manually track all conditional and unconditional lien releases due from each sub each month. Involves emailing subs, filing received documents, chasing non-compliant parties, and maintaining a standalone Excel tracking spreadsheet — not connected to Yardi.<\u002Fp>\n          <div class=\"rule\" data-cc-id=\"cc-2\" style=\"\"><strong>Note &nbsp;·&nbsp;<\u002Fstrong> One of the four dominant time sinks. No enforcement at pay application submission — a sub can submit without a lien release and it enters the system. Massive legal risk.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Alina<\u002Fspan><span class=\"owner-chip\">Brisa<\u002Fspan><span class=\"owner-chip\">Kim<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\">~3 hrs / project / month<\u002Fspan>\n            <div class=\"bar-wrap\"><div class=\"bar sink\" style=\"width: 75%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Outlook<\u002Fspan><span class=\"sys-chip\">Excel<\u002Fspan><span class=\"sys-chip\">Box<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.5 -->\n      <div class=\"step timesink\">\n        <div class=\"idx\">1.5\n        <\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-5\">\n          <h3>PM % Complete Cross-Check <span class=\"flag-pill sink\" style=\"margin-left:6px;\">TIME SINK<\u002Fspan><\u002Fh3>\n          <p data-cc-id=\"cc-4\" style=\"\">PMs cross-check invoice amounts and % complete for each SOV line item against actual site conditions. Gut check — PM validates claimed % complete against field knowledge, visiting the site periodically. Discrepancies flagged for correction before Grady's review. Confirmation communicated verbally with the field (phone — not logged).<\u002Fp>\n          <div class=\"rule\"><strong>Business Rule &nbsp;·&nbsp;<\u002Fstrong> Subs are paid on a trailing month basis. A sub billing higher than current conditions is not automatically wrong — the question is whether they'll reach that % by check date.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\" data-cc-id=\"cc-6\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Pedro<\u002Fspan><span class=\"owner-chip\">Greg<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-8\" style=\"\">~3 hrs / project / month<\u002Fspan>\n            <div class=\"bar-wrap\"><div class=\"bar sink\" style=\"width: 75%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Field / Verbal<\u002Fspan><span class=\"sys-chip\">Bluebeam<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.6 -->\n      <div class=\"step timesink\">\n        <div class=\"idx\">1.6\n        <\u002Fdiv>\n        <div class=\"body\">\n          <h3>Bluebeam Review &amp; Tagging <span class=\"flag-pill ceo\" style=\"margin-left:6px;\">PRES. TIME<\u002Fspan> <span class=\"flag-pill sink\" style=\"margin-left:4px;\">TIME SINK<\u002Fspan><\u002Fh3>\n          <p data-cc-id=\"cc-7\" style=\"\">Grady opens each pay application invoice PDF in Bluebeam, tags it with project name and Yardi cost code, and clouds the relevant information. Also, approves extra invoices (owner-reimbursable items outside GMP). Invoice errors → Grady emails the sub directly or instructs coordinators to address.<\u002Fp>\n          <div class=\"rule\"><strong>Cost &nbsp;·&nbsp;<\u002Fstrong> President time spent on a clerical cost-coding task.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip ceo\" data-cc-id=\"cc-1\" style=\"\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-3\" style=\"\"><span style=\"letter-spacing: 1.05px;\">~<\u002Fspan>1 hr / project / month<\u002Fspan>\n            <div class=\"bar-wrap\" data-cc-id=\"cc-5\"><div class=\"bar sink\" style=\"width: 25%\" data-cc-id=\"cc-4\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Bluebeam<\u002Fspan><span class=\"sys-chip\">Box<\u002Fspan><span class=\"sys-chip\">Outlook<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.7 -->\n      <div class=\"step\">\n        <div class=\"idx\">1.7<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Folder Transfer<\u002Fh3>\n          <p>Cut-and-paste pay application packages from <code class=\"code\">Unapproved<\u002Fcode> to <code class=\"code\">Approved - Coded<\u002Fcode> folder in Box once tagged and audited.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip ceo\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-9\" style=\"\">~10 sec / project / month<\u002Fspan>\n            <div class=\"bar-wrap\"><div class=\"bar tiny\" style=\"width: 0.5%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Box<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.8 -->\n      <div class=\"step timesink\">\n        <div class=\"idx\">1.8\n        <\u002Fdiv>\n        <div class=\"body\">\n          <h3>Yardi Invoice Input <span class=\"flag-pill sink\" style=\"margin-left:6px;\">TIME SINK<\u002Fspan><\u002Fh3>\n          <p>Manually inputs each invoice from the <code class=\"code\">Approved-Coded<\u002Fcode> folder into Yardi — full encoding: open PDF, enter Payee, Invoice #, Expense Type, Total, Invoice Date, Post Month, Due Date. Then review the uploaded batch to confirm amounts and cost codes before passing to Robert.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Alina<\u002Fspan><span class=\"owner-chip\">Brisa<\u002Fspan><span class=\"owner-chip\">Kim<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\">~2 hrs / project / month<\u002Fspan>\n            <div class=\"bar-wrap\" data-cc-id=\"cc-7\"><div class=\"bar sink\" style=\"width: 50%\" data-cc-id=\"cc-6\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Yardi<\u002Fspan><span class=\"sys-chip\">Box<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.9 -->\n      <div class=\"step\">\n        <div class=\"idx\">1.9<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-9\">\n          <h3>Internal Notification<\u002Fh3>\n          <p data-cc-id=\"cc-8\" style=\"\">Sends email to internal billings team notifying that all invoices have been entered into Yardi.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Alina<\u002Fspan><span class=\"owner-chip\">Brisa<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-10\" style=\"\">~15 sec / project / month<\u002Fspan>\n            <div class=\"bar-wrap\"><div class=\"bar tiny\" style=\"width: 0.25%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Outlook<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.10 -->\n      <div class=\"step\">\n        <div class=\"idx\">1.10<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Yardi Approval Check<\u002Fh3>\n          <p>Robert logs into Yardi, checks all invoices against what coordinators entered, and approves them. Makes corrections directly if needed.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Robert<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-9\" style=\"\">~15 min / project / month<\u002Fspan>\n            <div class=\"bar-wrap\" data-cc-id=\"cc-8\"><div class=\"bar\" style=\"width: 6.25%\" data-cc-id=\"cc-10\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Yardi<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 1.11 -->\n      <div class=\"step\">\n        <div class=\"idx\">1.11<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Yardi Posting<\u002Fh3>\n          <p>Clicks <strong>\"Select All (Post)\"<\u002Fstrong> then <strong>\"Create Payable Batch\"<\u002Fstrong> — the final compliance step that posts invoices into Yardi.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Robert<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-11\" style=\"\">~10 sec / project / month<\u002Fspan>\n            <div class=\"bar-wrap\"><div class=\"bar tiny\" style=\"width: 0.1%\"><\u002Fdiv><\u002Fdiv>\n            <div class=\"scale\"><span>0<\u002Fspan><span>4 hrs<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Yardi<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv><!-- /steps -->\n  <\u002Fdiv><!-- /phase 1 -->\n\n  <!-- Continue in phases-2-5.html fragment injected via shared file? Just keep inline for simplicity -->\n  <!-- PHASE 2 -->\n  <div class=\"phase\">\n    <div class=\"phase-band\">\n      <div class=\"ph-num\">2<\u002Fdiv>\n      <div class=\"ph-title\">\n        <div class=\"eyebrow\">Phase Two<\u002Fdiv>\n        <h2 data-cc-id=\"cc-11\" style=\"\">Monthly Owner Pay Application Document Generation<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"ph-meta\" data-cc-id=\"cc-23\">\n        <div class=\"k\" data-cc-id=\"cc-22\" style=\"\">Phase Total (per project)<\u002Fdiv>\n        <div class=\"v\">~1.5 hrs<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"steps\">\n\n      <div class=\"step\">\n        <div class=\"idx\">2.1<\u002Fdiv>\n        <div class=\"body\"><h3>Create New Draw in Yardi<\u002Fh3><p>Creates the new draw in Yardi: select project, select draw date.<\u002Fp><\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\"> ase &nbsp;·&nbsp;<\u002Fstrong> For certain projects, Grady requires the GC % to match his inputted % complete, requiring Robert to print and calculate before inputting. Robert also references prior draws for some fields and must reduce Project Admin if the bank flagged it for exceeding thresholds.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\" data-cc-id=\"cc-2\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Robert<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-14\" style=\"\">~20 min / project / month<\u002Fspan><div class=\"bar-wrap\" data-cc-id=\"cc-16\"><div class=\"bar\" style=\"width: 16.7%\" data-cc-id=\"cc-15\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>2 hrs<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Yardi<\u002Fspan><span class=\"sys-chip\" data-cc-id=\"cc-1\" style=\"\">Box<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">2.4<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Generate Draw Documents<\u002Fh3>\n          <p data-cc-id=\"cc-1\" style=\"\">Robert generates five core documents. LV Actuals data input into a locally-stored dynamic Excel spreadsheet. VLOOKUP functions pull Draw Sheet 2 data to auto-generate AIA G702, G703, and G701.<\u002Fp>\n          <table class=\"doc-table\">\n            <thead><tr><th>#<\u002Fth><th>Document<\u002Fth><th>Source<\u002Fth><th>Notes<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr><td>1<\u002Ftd><td class=\"doc\">LV Actuals thru Billing Month<\u002Ftd><td>Yardi Job Cost Register<\u002Ftd><td>All invoices summarized by cost code<\u002Ftd><\u002Ftr>\n              <tr><td>2<\u002Ftd><td class=\"doc\">Draw Sheet 2<\u002Ftd><td>Yardi Draw Analytics<\u002Ftd><td>G703-style; Robert manually adds \"Materials Stored\" column (banks require)<\u002Ftd><\u002Ftr>\n              <tr><td>3<\u002Ftd><td class=\"doc\">AIA G702<\u002Ftd><td>Excel from Doc 1+2<\u002Ftd><td>Application and Certificate for Payment<\u002Ftd><\u002Ftr>\n              <tr><td>4<\u002Ftd><td class=\"doc\">AIA G703<\u002Ftd><td>Excel from Doc 1+2<\u002Ftd><td>Continuation Sheet — line item SOV detail<\u002Ftd><\u002Ftr>\n              <tr><td>5<\u002Ftd><td class=\"doc\">AIA G701 (if COs)<\u002Ftd><td>Excel<\u002Ftd><td>Change Order summary — 5–30 min depending on complexity<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n          <div class=\"rule\" data-cc-id=\"cc-2\" style=\"\"><strong>Target &nbsp;·&nbsp;<\u002Fstrong> This Excel dependency is a target for elimination.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Robert<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-14\" style=\"\">~30 min / project / month<\u002Fspan><div class=\"bar-wrap\"><div class=\"bar\" style=\"width: 25%\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>2 hrs<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Yardi<\u002Fspan><span class=\"sys-chip\">Excel<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">2.5<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-4\">\n          <h3>Unsigned Conditional Lien Waiver (GC → Owner)<\u002Fh3>\n          <p data-cc-id=\"cc-5\" style=\"\">Generates unsigned Conditional Lien Waiver from LV to the owner using a Word template stored in Box. Pre-populates with current billing amount, iv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>2 hrs<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Word<\u002Fspan><span class=\"sys-chip\">Bank<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">2.7<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-8\">\n          <h3>Extra Invoices (if applicable)<\u002Fh3>\n          <p data-cc-id=\"cc-7\" style=\"\">For owner-reimbursed invoices outside GMP owner-GC contract. Robert copies prior month's PDF, adjusts totals, consolidates GC Extra invoices into a single PDF.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Robert<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-17\" style=\"\">~15 min / project / month<\u002Fspan><div class=\"bar-wrap\"><div class=\"bar\" style=\"width: 12.5%\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>2 hrs<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Bluebeam<\u002Fspan><span class=\"sys-chip\">Box<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">2.8<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Review Notification to Grady<\u002Fh3>\n          <p>Sends email to Grady confirming all draw documents are ready. Copies prior month's email to ensure nothing is missed. Documents sent as zip file due to Outlook attachment limits.<\u002Fp>\n          <div class=\"rule\" data-cc-id=\"cc-9\" style=\"\"><strong>Infrastructure &nbsp;·&nbsp;<\u002Fstrong> Six Peak's broader organization operates
