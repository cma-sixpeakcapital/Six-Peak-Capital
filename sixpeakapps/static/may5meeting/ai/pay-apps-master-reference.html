d\">Comparison<\u002Fdiv>\n      <div class=\"head\">What's Being Checked<\u002Fdiv>\n      <div class=\"head\">Time<\u002Fdiv>\n\n      <div class=\"num\">1<\u002Fdiv>\n      <div><strong>LV Actuals<\u002Fstrong> vs. Approved Box Folder<\u002Fdiv>\n      <div>All cost codes and amounts correct; no duplicates or missing invoices<\u002Fdiv>\n      <div class=\"code\" data-cc-id=\"cc-19\" style=\"\">~10 min / project / month<\u002Fdiv>\n      <div class=\"num\">2<\u002Fdiv>\n      <div><strong>LV Actuals<\u002Fstrong> vs. Draw Sheet 2<\u002Fdiv>\n      <div>Cost codes billed correctly; % drawn under 100% for all line items<\u002Fdiv>\n      <div class=\"code\">~10 min / project / month<\u002Fdiv>\n      <div class=\"num\">3<\u002Fdiv>\n      <div><strong>Draw Sheet 2<\u002Fstrong> vs. AIA G702<\u002Fdiv>\n      <div>High-level contract and payment sums correct<\u002Fdiv>\n      <div class=\"code\">~2 min / project / month<\u002Fdiv>\n      <div class=\"num\">4<\u002Fdiv>\n      <div><strong>Draw Sheet 2<\u002Fstrong> vs. AIA G703<\u002Fdiv>\n      <div>Granular line-item amounts match<\u002Fdiv>\n      <div class=\"code\">~2 min / project / month<\u002Fdiv>\n      <div class=\"num\">5<\u002Fdiv>\n      <div><strong>Change Orders<\u002Fstrong> vs. AIA G701 (conditional)<\u002Fdiv>\n      <div>All COs for the period accounted for<\u002Fdiv>\n      <div class=\"code\">~5 min / project / month<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"loop-diagram\">\n      <div class=\"corner\">Resolution Loop<\u002Fdiv>\n      <h3>If any comparison fails → loop until pass.<\u002Fh3>\n      <div class=\"loop-chain\">\n        <div class=\"loop-node\"><div class=\"n\">Step 1<\u002Fdiv><div class=\"t\">Grady reviews<\u002Fdiv><div class=\"s\">Side-by-side PDF comparison<\u002Fdiv><\u002Fdiv>\n        <div class=\"loop-node\"><div class=\"n\">Step 2 · Fail<\u002Fdiv><div class=\"t\">Robert revises<\u002Fdiv><div class=\"s\">Source doc correction<\u002Fdiv><\u002Fdiv>\n        <div class=\"loop-node\"><div class=\"n\">Step 3<\u002Fdiv><div class=\"t\">Grady re-reviews<\u002Fdiv><div class=\"s\">Loop until pass<\u002Fdiv><\u002Fdiv>\n        <div class=\"loop-node\"><div class=\"n\">Step 4 · Pass<\u002Fdiv><div class=\"t\">Save to Box<\u002Fdiv><div class=\"s\">/Billings/[Month]/Draw Docs → Phase 4<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"loop-arc\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv><!-- /phase 3 -->\n\n  <!-- PHASE 4 -->\n  <div class=\"phase\">\n    <div class=\"phase-band\">\n      <div class=\"ph-num\">4<\u002Fdiv>\n      <div class=\"ph-title\">\n        <div class=\"eyebrow\">Phase Four<\u002Fdiv>\n        <h2>Supporting Report Generation<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"ph-meta\">\n        <div class=\"k\" data-cc-id=\"cc-35\" style=\"\">Phase Total (per project)<\u002Fdiv>\n        <div class=\"v\">~10 min<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"steps\">\n\n      <div class=\"step\">\n        <div class=\"idx\">4.1<\u002Fdiv>\n        <div class=\"body\">\n          <h3>RFI Log<\u002Fh3>\n          <p>Exports the current RFI Log from Autodesk Build: <code class=\"code\">Export → Run Report<\u002Fcode>.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip ceo\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-20\" style=\"\">~3 min / project / month<\u002Fspan><div class=\"bar-wrap\" data-cc-id=\"cc-26\"><div class=\"bar\" style=\"width: 10%\" data-cc-id=\"cc-37\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>30 min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Autodesk Build<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">4.2<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Buyout Report<\u002Fh3>\n          <p>Pulls the current buyout report from Box at <code class=\"code\">[Specific Project]/Subcontractors/Buyout Report<\u002Fcode>.<\u002Fp>\n          <div class=\"rule\"><strong>Note &nbsp;·&nbsp;<\u002Fstrong> Current format is an Excel file. Grady extracts as PDF for distribution.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\" data-cc-id=\"cc-21\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip ceo\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-36\" style=\"\">~3 min / project / month<\u002Fspan><div class=\"bar-wrap\"><div class=\"bar\" style=\"width: 10%\" data-cc-id=\"cc-29\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>30 min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Box<\u002Fspan><span class=\"sys-chip\">Excel<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">4.3<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-2\">\n          <h3 data-cc-id=\"cc-1\" style=\"\">GMP Construction Schedule<\u002Fh3>\n          <p data-cc-id=\"cc-3\" style=\"\">Pulls the GMP schedule from Box at <code class=\"code\">[Specific Project]/Schedule<\u002Fcode>.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip ceo\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-31\" style=\"\">~2 min / project / month<\u002Fspan><div class=\"bar-wrap\" data-cc-id=\"cc-33\"><div class=\"bar tiny\" style=\"width: 6.7%; background-color: rgb(26, 20, 16);\" data-cc-id=\"cc-32\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>30 min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Box<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">4.4<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-5\">\n          <h3>3-Week Look Ahead<\u002Fh3>\n          <p data-cc-id=\"cc-4\" style=\"\">Edits the existing GMP Construction Schedule in Bluebeam to produce the 3-week look ahead.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip ceo\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-30\" style=\"\">~2 min / project / Month<\u002Fspan><div class=\"bar-wrap\" data-cc-id=\"cc-27\"><div class=\"bar tiny\" style=\"width: 6.7%; background-color: rgb(26, 20, 16);\" data-cc-id=\"cc-28\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>30 min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\" data-cc-id=\"cc-6\" style=\"\">Bluebeam<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div style=\"padding: 14px 16px; border: 1.5px solid var(--ink); border-top: none; background: var(--paper-deep); font-size: 13.5px; color: var(--ink-soft);\"><strong>Destination &nbsp;·&nbsp;<\u002Fstrong> All saved to Box → <code class=\"code\">[Project]/Billings/[Specific Month]/Draw Docs<\u002Fcode><\u002Fdiv>\n  <\u002Fdiv><!-- /phase 4 -->\n\n  <!-- PHASE 5 -->\n  <div class=\"phase\">\n    <div class=\"phase-band\">\n      <div class=\"ph-num\">5<\u002Fdiv>\n      <div class=\"ph-title\">\n        <div class=\"eyebrow\">Phase Five<\u002Fdiv>\n        <h2>Owner Submission &amp; Final Approval<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"ph-meta\">\n        <div class=\"k\">Phase Total (per project · excl. release of funds)<\u002Fdiv>\n        <div class=\"v\">~15 min&nbsp;·&nbsp;Funds Released · 2–3 wks<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"steps\">\n      <div class=\"step\">\n        <div class=\"idx\">5.1<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-9\">\n          <h3>Assemble Pay App Package<\u002Fh3>\n          <p data-cc-id=\"cc-8\" style=\"\">All documents combined into one single PDF in correct order using Bluebeam.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip ceo\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-38\" style=\"\">~5 min / project / month<\u002Fspan><div class=\"bar-wrap\"><div class=\"bar\" style=\"width: 16.7%\" data-cc-id=\"cc-40\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>30 min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Bluebeam<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">5.2<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-11\">\n          <h3>Route to Box Sign for Signatures<\u002Fh3>\n          <p data-cc-id=\"cc-10\" style=\"\">Grady routes the full package to Box Sign and assigns signature/date fields . Signs all LV fields (conditional + unconditional lien waivers). Routes to owner for signature/approval.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"meta\" data-cc-id=\"cc-57\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip ceo\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-1\" style=\"\">~5 min / project / month<\u002Fspan><div class=\"bar-wrap\"><div class=\"bar\" style=\"width: 17%\" data-cc-id=\"cc-39\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>30 min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Box Sign<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">5.3<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-2\">\n          <h3>Owner Submission<\u002Fh3>\n          <p>Owner receives via Box Sign routing. Grady sends a cover email with context on the draw.<\u002Fp>\n          <div class=\"rule\" data-cc-id=\"cc-1\" style=\"\"><strong>Package includes &nbsp;·&nbsp;<\u002Fstrong> AIA G702/G703, AIA G701 (if applicable), signed conditional + unconditional waivers, invoice backup, Buyout Report, GMP Construction Schedule, 3-Week Look Ahead, RFI Log, Extra Invoices (if applicable).<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip ceo\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\" data-cc-id=\"cc-41\" style=\"\">~5 min / project / month<\u002Fspan><div class=\"bar-wrap\"><div class=\"bar\" style=\"width: 16.7%\" data-cc-id=\"cc-42\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>30 min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Box Sign<\u002Fspan><span class=\"sys-chip\">Outlook<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"step\">\n        <div class=\"idx\">5.4<\u002Fdiv>\n        <div class=\"body\">\n          <h3>Owner Review &amp; Completion<\u002Fh3>\n          <p>Owner reviews and approves or requests revisions. Most common revision requests: missing conditional lien releases from subs or compliance issues. Grady executes revisions and resubmits. Loop until approval.<\u002Fp>\n          <div class=\"rule\"><strong>End State &nbsp;·&nbsp;<\u002Fstrong> Owner approves Pay App. Funds released from bank draw in <strong>2 to 3 weeks<\u002Fstrong>.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"meta-row\"><span class=\"k\">Owner<\u002Fspan><div class=\"owner-chips\"><span class=\"owner-chip\">Owner / Lender<\u002Fspan><span class=\"owner-chip ceo\">Grady<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"tbar\"><span class=\"lbl\">Variable · revision loop<\u002Fspan><div class=\"bar-wrap\"><div class=\"bar\" style=\"width: 60%\"><\u002Fdiv><\u002Fdiv><div class=\"scale\"><span>0<\u002Fspan><span>Days<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"meta-row\"><span class=\"k\">Systems<\u002Fspan><div class=\"sys-list\"><span class=\"sys-chip\">Box Sign<\u002Fspan><span class=\"sys-chip\">Outlook<\u002Fspan><span class=\"sys-chip\">Bank<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"loop-diagram\">\n      <div class=\"corner\">Resolution Loop<\u002Fdiv>\n      <h3>If owner requests revisions → loop until approval.<\u002Fh3>\n      <div class=\"loop-chain\">\n        <div class=\"loop-node\"><div class=\"n\">Step 1<\u002Fdiv><div class=\"t\">Owner reviews<\u002Fdiv><div class=\"s\">Reviews submitted pay app package<\u002Fdiv><\u002Fdiv>\n        <div class=\"loop-node\"><div class=\"n\">Step 2 · Revisions<\u002Fdiv><div class=\"t\">Grady revises<\u002Fdiv><div class=\"s\">Missing lien releases, compliance fixes<\u002Fdiv><\u002Fdiv>\n        <div class=\"loop-node\"><div class=\"n\">Step 3<\u002Fdiv><div class=\"t\">Resubmit<\u002Fdiv><div class=\"s\">Loop until approval<\u002Fdiv><\u002Fdiv>\n        <div class=\"loop-node\"><div class=\"n\">Step 4 · Approved<\u002Fdiv><div class=\"t\">Funds Released<\u002Fdiv><div class=\"s\">Bank draw release · 2–3 weeks<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"loop-arc\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Sub Lien Release risk note -->\n  <div class=\"money-flow\" style=\"background:#F7E7DF; margin-top: 40px;\">\n    <div class=\"corner\" style=\"background: var(--accent-flag);\">[Risk] Sub Lien Release Compliance<\u002Fdiv>\n    <h3>Sub-tier vendor lien exposure is one of the highest liability risks in construction.<\u002Fh3>\n    <p>Separate from LV's own lien waivers (Steps 2.5–2.6), subcontractors must submit their own Conditional and Unconditional Lien Releases with each billing. Sub-tier vendors (material suppliers, equipment vendors who retain lien rights via preliminary notices) must also provide releases — and/or joint checks must be issued.<\u002Fp>\n    <p><strong>Current tracking:<\u002Fstrong> Alina/Brisa maintains a standalone Excel spreadsheet by sub, by project, by month. No enforcement at invoice submission. Chasing non-compliant parties consumes ~3 hrs/project/month. Joint checks issued rarely with informal tracking.<\u002Fp>\n    <p data-cc-id=\"cc-1\" style=\"\"><strong>Joint check system:<\u002Fstrong> LV plans to implement a policy that any check &gt;$10,000 must be a joint check.<\u002Fp>\n    <div class=\"risk-note\"><strong>[Legal Flag]<\u002Fstrong> &nbsp; The joint check and lien waiver compliance system has direct legal implications — automation design must involve attorney review before deployment.<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n<!-- ============ SECTION 3 · TIME & COST SUMMARY ============ -->\n<section class=\"section\" data-cc-id=\"cc-2\">\n  <div class=\"section-header\">\n    <div class=\"num\">§ 03<\u002Fdiv>\n    <h2>Time &amp; Cost Summary<\u002Fh2>\n    <div class=\"kicker\">Where the hours go<\u002Fdiv>\n  <\u002Fdiv>\n\n  <p style=\"max-width: 78ch; color: var(--ink-soft); font-size: 15px;\" data-cc-id=\"cc-3\">\n    The full pay app workflow consumes <strong>~62 hrs<\u002Fstrong> of team time per month across 5 projects. At 9 projects, this reaches <strong>~112 hrs/month<\u002Fstrong>. Phase 1 alone accounts for roughly <strong>~80%<\u002Fstrong> of that effort.\n  <\u002Fp>\n\n  <h3 style=\"margin-top: 36px; margin-bottom: 4px;\">Monthly Hours by Phase<\u002Fh3>\n  <p style=\"color: var(--ink-soft); font-size: 13.5px; margin-bottom: 16px;\">Bars show monthly hours at 5 projects (solid) and scaled to 9 projects (ghost). Scale: 0–100 hrs.<\u002Fp>\n\n  <div class=\"sinks-wrap\">\n    <!-- scale is 0–80 hrs -->\n    <div class=\"sink-row\">\n      <div class=\"name\">Phase 1 · Sub Pay App Collection &amp; Invoice Tagging <span class=\"sub\">Steps 1.1 – 1.11 · Full team<\u002Fspan><\u002Fdiv>\n      <div class=\"bar-area\">\n        <div class=\"b9\" style=\"width: 90%\"><\u002Fdiv>\n        <div class=\"b5\" style=\"width: 50%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 25%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 50%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 75%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hours\">~50 hrs/mo<span>@ 5 Projects<\u002Fspan><\u002Fdiv>\n      <div class=\"who\">~90 hrs/mo<div><span style=\"color:var(--ink-mute);\">@ 9 projects<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sink-row\">\n      <div class=\"name\">Phase 2 · Owner Pay App Document Generation <span class=\"sub\">Steps 2.1 – 2.8 · Controller<\u002Fspan><\u002Fdiv>\n      <div class=\"bar-area\">\n        <div class=\"b9\" style=\"width: 13.5%\"><\u002Fdiv>\n        <div class=\"b5\" style=\"width: 7.5%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 25%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 50%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 75%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hours\">~7.5 hrs/mo<span>@ 5 Projects<\u002Fspan><\u002Fdiv>\n      <div class=\"who\">~13.5 hrs/mo<div><span style=\"color:var(--ink-mute);\">@ 9 projects<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sink-row\">\n      <div class=\"name\">Phase 3 · Auditing &amp; Reconciliation <span class=\"sub\">President<\u002Fspan><\u002Fdiv>\n      <div class=\"bar-area\">\n        <div class=\"b9\" style=\"width: 4.5%\"><\u002Fdiv>\n        <div class=\"b5\" style=\"width: 2.5%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 25%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 50%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 75%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hours\">~2.5 hrs/mo<span>@ 5 Projects<\u002Fspan><\u002Fdiv>\n      <div class=\"who\">~4.5 hrs/mo<div><span style=\"color:var(--ink-mute);\">@ 9 projects<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sink-row\">\n      <div class=\"name\">Phase 4 · Supporting Report Generation <span class=\"sub\">Steps 4.1 – 4.3 · President<\u002Fspan><\u002Fdiv>\n      <div class=\"bar-area\">\n        <div class=\"b9\" style=\"width: 1.5%\"><\u002Fdiv>\n        <div class=\"b5\" style=\"width: 0.83%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 25%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 50%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 75%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hours\">~50 min/mo<span>@ 5 Projects<\u002Fspan><\u002Fdiv>\n      <div class=\"who\">~1.5 hrs/mo<div><span style=\"color:var(--ink-mute);\">@ 9 projects<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sink-row\">\n      <div class=\"name\">Phase 5 · Owner Submission &amp; Final Approval <span class=\"sub\">Steps 5.1 – 5.4 · President · variable, revision-dependent<\u002Fspan><\u002Fdiv>\n      <div class=\"bar-area\">\n        <div class=\"b9\" style=\"width: 2.25%\"><\u002Fdiv>\n        <div class=\"b5\" style=\"width: 1.25%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 25%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 50%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 75%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hours\">~1.25 hrs/mo<span>@ 5 Projects<\u002Fspan><\u002Fdiv>\n      <div class=\"who\">~2.25 hrs/mo<div><span style=\"color:var(--ink-mute);\">@ 9 projects<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sink-scale\" data-cc-id=\"cc-2\">\n      <div><\u002Fdiv>\n      <div class=\"axis\"><span>0 hrs<\u002Fspan><span>25<\u002Fspan><span>50<\u002Fspan><span>75<\u002Fspan><span>100 hrs<\u002Fspan><\u002Fdiv>\n      <div><\u002Fdiv><div><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <h3 style=\"margin-top: 48px; margin-bottom: 4px;\">The Four Dominant Time Sinks<\u002Fh3>\n  <p style=\"color: var(--ink-soft); font-size: 13.5px; margin-bottom: 16px;\">All occur in Phase 1. Bars show monthly hours at 5 projects (solid) and scaled to 9 projects (ghost). Scale: 0–40 hrs.<\u002Fp>\n\n  <div class=\"sinks-wrap\">\n    <!-- scale is 0–40 hrs -->\n    <div class=\"sink-row\">\n      <div class=\"name\">Lien Release Tracking <span class=\"sub\">Step 1.4 · Alina / Brisa / Kim<\u002Fspan><\u002Fdiv>\n      <div class=\"bar-area\">\n        <div class=\"b9\" style=\"width: 67.5%\"><\u002Fdiv>\n        <div class=\"b5\" style=\"width: 37.5%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 25%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 50%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 75%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hour le-line\" style=\"left: 50%\"><\u002Fdiv>\n        <div class=\"scale-line\" style=\"left: 75%\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hours\">~$420<span>@ 5 Projects / Mo<\u002Fspan><\u002Fdiv>\n      <div class=\"who\">~$760 <span style=\"color:var(--ink-mute);\">@ 9 proj<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sink-scale\">\n      <div><\u002Fdiv>\n      <div class=\"axis\"><span>$0<\u002Fspan><span>$4K<\u002Fspan><span>$8K<\u002Fspan><span>$12K<\u002Fspan><span>$16K<\u002Fspan><\u002Fdiv>\n      <div><\u002Fdiv><div><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Cost cells -->\n  <div class=\"cost-grid\" style=\"margin-top: 36px;\">\n    <div class=\"cost-cell\">\n      <h4>Full Workflow Annual Labor · 5 Projects<\u002Fh4>\n      <div class=\"big\"><span>~$89.3K<\u002Fspan> – $98.5K<span style=\"font-size: 22px; color: var(--ink-mute); font-family: 'JetBrains Mono', monospace;\"> / yr<\u002Fspan><\u002Fdiv>\n      <div class=\"sub\">All 5 phases · President + Controller + PMs + Coordinators at loaded rates<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"cost-cell\">\n      <h4>Full Workflow Annual Labor · 9 Projects<\u002Fh4>\n      <div class=\"big\"><span>~$160.7K<\u002Fspan> – $177.2K<span style=\"font-size: 22px; color: var(--ink-mute); font-family: 'JetBrains Mono', monospace;\"> / yr<\u002Fspan><\u002Fdiv>\n      <div class=\"sub\">Direct labor cost — compounding cost is larger<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FUTURE STATE ============ -->\n<section class=\"future-band\" data-cc-id=\"cc-8\">\n  <div class=\"stripe-top\"><\u002Fdiv>\n  <div class=\"future-title-row\" style=\"display:flex; align-items:baseline; gap:16px; margin-top: 4px;\">\n    <div class=\"num\" style=\"font-family:'Roboto Slab', serif; font-size: 28px; font-weight: 700; color: var(--lv-orange); line-height: 1;\">§ 04<\u002Fdiv>\n    <div style=\"color: var(--lv-orange); font-size: 28px; line-height: 1;\">·<\u002Fdiv>\n    <h2 style=\"white-space: nowrap; font-size: 38px; margin: 0;\">Future State · Mission Control<\u002Fh2>\n  <\u002Fdiv>\n\n  <!-- Foundation: One Source of Truth -->\n  <div class=\"foundation\" data-cc-id=\"cc-2\">\n    <div class=\"eyebrow\">§ Foundation<\u002Fdiv>\n    <div class=\"f-head\">\n      <h3 class=\"f-headline\">One Source of Truth<\u002Fh3>\n      <div class=\"f-kicker\">Visibility is Accountability<\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"f-lead\">\n      Our current operational state is a <strong>disconnected stack<\u002Fstrong> with unstructured data scattered across tools. Mission Control aggregates everything under one roof — a centralized system where work is visible, data is structured, and insights are extractable as we scale. This isn't a replacement for our software stack; it's an <strong>enhancement layer<\u002Fstrong>. We start by augmenting today's workflows — and as automation compounds, the human role shifts from labor-intensive execution to true ownership as reviewer.\n    <\u002Fp>\n    <div class=\"f-cols\">\n      <div class=\"f-col\">\n        <div class=\"label\">Today<\u002Fdiv>\n        <div class=\"title\">Disconnected &amp; Invisible<\u002Fdiv>\n        <div class=\"body\" data-cc-id=\"cc-1\" style=\"\">Our tech stack operates in silos — Autodesk, Box, Yardi, Bluebeam, Excel, email. Data is unstructured, work is invisible across teams, and insights are locked inside individual workflows.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"f-col\">\n        <div class=\"label\">The Vision<\u002Fdiv>\n        <div class=\"title\">Aggregate Under One Roof<\u002Fdiv>\n        <div class=\"body\">Mission Control sits on top of the stack — not replacing it — and structures the data beneath. One centralized view where Grady, PMs, and coordinators see the same truth. Insights scale with the business.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"f-col\">\n        <div class=\"label\">The Path<\u002Fdiv>\n        <div class=\"title\" data-cc-id=\"cc-3\" style=\"\">Augment → Automate → Agency<\u002Fdiv>\n        <div class=\"body\">Start by supporting today's work. As automation matures, humans move from data entry to reviewing decisions — shifting the role from labor-intensive to true owner of the work.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Phase 1 future -->\n  <div class=\"f-phase\">\n    <div class=\"f-title\">Future Phase 1 · Invoice Collection &amp; Compliance Gating<\u002Fdiv>\n    <h3>Compliance-gated submission replaces manual tracking.<\u002Fh3>\n    <div class=\"f-steps\">\n      <div class=\"f-step\"><div class=\"idx\">1.1<\u002Fdiv><h4>Automated Billing Reminders<\u002Fh4><p>MC sends templated reminders at 7, 3, and 1 day before the billing deadline. Progressive urgency. Sub sees outstanding items in portal.<\u002Fp><div class=\"replaces\">Replaces <span>coordinator's manual reminder email<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\"><div class=\"idx\">1.2<\u002Fdiv><h4>In-Platform Invoice Submission<\u002Fh4><p data-cc-id=\"cc-2\" style=\"\">Sub fills a simple form in MC Sub Portal. MC auto-converts to AIA G702, maps to contract SOV, assigns cost codes with confidence scoring, flags anomalies. Coordinator becomes the reviewer.<\u002Fp><div class=\"replaces\">Replaces <span>Steps 1.2, 1.3, 1.6, 1.7, 1.8<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\"><div class=\"idx\">1.3<\u002Fdiv><h4 data-cc-id=\"cc-6\" style=\"\">Conditional Lien Release Gate<\u002Fh4><p data-cc-id=\"cc-3\" style=\"\">MC auto-generates sub's conditional release. Sub signs via Box Sign — cannot skip. Sub-tier vendor unconditionals are required through a gated entry platform. Real-time compliance dashboard across all projects.<\u002Fp><div class=\"replaces\">Replaces <span>Step 1.4 · ~15 hrs/month<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\" data-cc-id=\"cc-5\"><div class=\"idx\">1.4<\u002Fdiv><h4>Unconditional Auto-Tracking<\u002Fh4><p data-cc-id=\"cc-4\" style=\"\">MC monitors incoming email via Microsoft Graph API. OCR auto-detects document type, vendor, project, amount, signature. Auto-matches to outstanding request. Escalation: Day 1 → 3 → 7 → 14 (Grady).<\u002Fp><div class=\"replaces\">Future: <span>Bank feed integration triggers auto<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\"><div class=\"idx\">1.5<\u002Fdiv><h4>COI &amp; CSLB Compliance Gate<\u002Fh4><p data-cc-id=\"cc-4\" style=\"\">COI parsed natively. CSLB verified via cslb.ca.gov API. Expiration thresholds: &gt;60d PASS · 30–60d warn · &lt;30d BLOCK · expired BLOCK. Progressive reminders 90/60/30/7d before expiration.<\u002Fp><div class=\"replaces\" data-cc-id=\"cc-5\" style=\"\">New gate · <span>runs in parallel with lien check<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\" data-cc-id=\"cc-10\"><div class=\"idx\">1.6<\u002Fdiv><h4>AI Cost Code Assignment<\u002Fh4><p data-cc-id=\"cc-6\" style=\"\">OCR extracts line items. AI assigns Yardi cost codes with confidence: &gt;95% auto; 75–95% flagged; &lt;75% manual. Anomaly detection: SOV exceedance, trajectory mismatch, trade/code mismatch.<\u002Fp><div class=\"replaces\" data-cc-id=\"cc-12\" style=\"\">Replaces <span data-cc-id=\"cc-11\" style=\"\">Grady's Bluebeam tagging<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\"><div class=\"idx\">1.7<\u002Fdiv><h4>PM % Complete Verification<\u002Fh4><p>MC routes request with summary of % claimed per SOV, delta vs. prior month, anomaly flags. PM reviews in-platform — approve, adjust, flag. OpenSpace 360° captures auto-attached. Long-term: computer vision auto-assesses % complete.<\u002Fp><div class=\"replaces\" data-cc-id=\"cc-7\" style=\"\">Human judgment <span>earns its place here<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\" data-cc-id=\"cc-13\"><div class=\"idx\">1.8<\u002Fdiv><h4>Yardi Sync<\u002Fh4><p data-cc-id=\"cc-8\" style=\"\">MC connected end-to-end with Yardi for real time, accurate bidirectional information between the two platforms.<\u002Fp><div class=\"replaces\" data-cc-id=\"cc-9\" style=\"\">Replaces&nbsp;<span style=\"color: rgb(243, 134, 78); letter-spacing: 0.63px;\">manual Yardi entries<\u002Fspan>&nbsp;<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Phase 2-5 future -->\n  <div class=\"f-phase\">\n    <div class=\"f-title\">Future Phases 2 – 5 · Generation · Audit · Reports · Submission<\u002Fdiv>\n    <h3>From 4+ hours of Robert's Excel work to one-click draw packages.<\u002Fh3>\n    <div class=\"f-steps\">\n      <div class=\"f-step\"><h4>Automated Draw Package<\u002Fh4><p>MC generates all 8 documents from structured data: LV Actuals, Draw Sheet 2, AIA G702/G703/G701, Conditional + Unconditional Waivers, Extra Invoices. GC fee auto-applied from contract.<\u002Fp><div class=\"replaces\">Replaces <span>Robert's entire Phase 2<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\"><h4>Real-Time Validation<\u002Fh4><p>MC runs all 5 audit comparisons instantaneously. Clerical errors auto-corrected and logged. Substantive errors flagged with source identified. By this point all inputs have passed compliance gates — errors should be rare.<\u002Fp><div class=\"replaces\">Replaces <span>Grady's manual audit + revision loops<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\"><h4>Grady Draw Approval<\u002Fh4><p>MC presents clean draw summary dashboard: total amount, prior-month comparison, all flags, all documents in one view. Grady reviews, approves, signs lien waivers via e-signature.<\u002Fp><div class=\"replaces\">The <span>one required human approval<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\"><h4>Auto-Generated Support Docs<\u002Fh4><p>RFI Log pulled from Autodesk API (MC native long-term). Buyout Report and Master Schedule generated natively from MC data. 3-Week Look Ahead auto-extracted from MC's live schedule — date-filtered.<\u002Fp><div class=\"replaces\">Replaces <span>Grady's manual export / retrieval<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\"><h4>Package Assembly + Submission<\u002Fh4><p>MC compiles single PDF in correct order (no Bluebeam). Drafts owner email. Grady reviews, clicks send. MC tracks response status with automated follow-up.<\u002Fp><div class=\"replaces\">Replaces <span>Bluebeam assembly + manual email<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"f-step\"><h4>Lender Portal · Sub Health Radar<\u002Fh4><p data-cc-id=\"cc-1\" style=\"\">Read-only lender portal gives banks real-time visibility. Sub Financial Health Radar surfaces billing patterns, payment velocity, SOV burn, compliance history. Identifies at-risk subs before they become problems.<\u002Fp><div class=\"replaces\">Broader MC vision · <span>data aggregation unlock<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Future metrics -->\n  <div class=\"f-metrics\">\n    <div class=\"f-metric\">\n      <div class=\"k\" data-cc-id=\"cc-1\" style=\"\">Coordinator · Time / Project / Month<\u002Fdiv>\n      <div class=\"now\">4.8–9.9 hrs<\u002Fdiv>\n      <div class=\"fut\"><span>~30–55 min<\u002Fspan> · human touchpoints only<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"f-metric\">\n      <div class=\"k\">Human Touchpoints<\u002Fdiv>\n      <div class=\"now\">Every step<\u002Fdiv>\n      <div class=\"fut\"><span>4 steps<\u002Fspan> · flagged invoice · PM % · draw approval · owner review<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"f-metric\">\n      <div class=\"k\">Grady's Monthly Time · 5 Proj<\u002Fdiv>\n      <div class=\"now\">2.5–10 hrs + audit time<\u002Fdiv>\n      <div class=\"fut\"><span>~1–2 hrs<\u002Fspan> · draw approval only<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top: 44px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.25); display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 20px;\">\n    <div>\n      <div class=\"f-title\" style=\"margin-bottom: 8px;\">AI Automation Score<\u002Fdiv>\n      <div style=\"font-family: 'Roboto Slab', serif; font-size: 30px; color: var(--paper); font-weight: 700;\">8.3 / 10 · <span style=\"color: var(--lv-orange-soft);\">Sprint 1 Priority<\u002Fspan><\u002Fdiv>\n      <div style=\"color: #B8AE97; font-size: 13.5px; margin-top: 6px;\">Highest automation readiness of any MC workflow.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #8A7D63; letter-spacing: 0.14em; text-transform: uppercase; text-align: right;\">\n      Volume 9 · Repeatability 9 · Data Availability 6<br>\n      Error Cost 9 · Technical Complexity 8\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fsection>\n\n<!-- ============ COLOPHON ============ -->\n<footer class=\"colophon\">\n  <div>WF-04-001 · Pay Applications · v1.0<\u002Fdiv>\n  <div>\n    <span>LV Construction<\u002Fspan>\n    <span class=\"dot\">●<\u002Fspan>\n    <span>Six Peak Capital<\u002Fspan>\n    <span class=\"dot\">●<\u002Fspan>\n    <span>April 2026<\u002Fspan>\n  <\u002Fdiv>\n  <div>Confidential<\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
